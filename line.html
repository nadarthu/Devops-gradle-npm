<!DOCTYPE html>
<html>
<head>
<script src="node_modules/apexcharts/dist/apexcharts.min.js"></script>
</head>

<body>

<div id="chart"></div>

<script>

var options = {
  chart: {
    type: 'line'
  },
  series: [{
    name: "Students",
    data: [10, 15, 8, 12, 20]
  }],
  xaxis: {
    categories: ["Mon", "Tue", "Wed", "Thu", "Fri"]
  }
};

var chart = new ApexCharts(document.querySelector("#chart"), options);
chart.render();

</script>

</body>
</html>
